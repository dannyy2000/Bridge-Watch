<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .bg { fill: #0b1220; }
      .card { fill: #111a2e; stroke: #22304d; stroke-width: 2; }
      .title { fill: #e5e7eb; font: 700 34px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; }
      .sub { fill: #9ca3af; font: 500 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; }
      .label { fill: #cbd5e1; font: 600 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; }
      .muted { fill: #94a3b8; font: 500 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; }
      .ok { fill: #22c55e; }
      .bad { fill: #ef4444; }
      .line { stroke: #34d399; stroke-width: 3; fill: none; opacity: .9; }
      .grid { stroke: #1f2a44; stroke-width: 1; opacity: .8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="630"/>

  <text class="title" x="40" y="72">Bridge Watch - Service Health (Template)</text>
  <text class="sub" x="40" y="102">Example layout (SVG preview). Drill-down by job/instance/route.</text>

  <rect class="card" x="40" y="140" width="420" height="130" rx="14"/>
  <text class="label" x="65" y="175">Up (per instance)</text>
  <circle class="ok" cx="365" cy="195" r="10"/>
  <text class="muted" x="65" y="210">up{job="$job", instance=~"$instance"}</text>
  <text class="muted" x="65" y="245">instance-1: UP</text>
  <text class="muted" x="65" y="265">instance-2: UP</text>

  <rect class="card" x="485" y="140" width="675" height="130" rx="14"/>
  <text class="label" x="510" y="175">Traffic by Route (RPS)</text>
  <text class="muted" x="510" y="210">sum by(route) (rate(http_requests_total[5m]))</text>
  <path class="grid" d="M510 250 H1135"/>
  <path class="line" d="M515 245 C640 220, 760 270, 860 240 C980 205, 1070 270, 1140 235"/>

  <rect class="card" x="40" y="290" width="560" height="160" rx="14"/>
  <text class="label" x="65" y="325">Errors by Route (5xx %)</text>
  <text class="muted" x="65" y="350">(5xx / all) * 100</text>
  <path class="grid" d="M65 415 H575"/>
  <path class="line" d="M70 410 C170 420, 240 390, 330 415 C420 440, 500 400, 565 420"/>

  <rect class="card" x="625" y="290" width="535" height="160" rx="14"/>
  <text class="label" x="650" y="325">Latency by Route (p95, s)</text>
  <text class="muted" x="650" y="350">histogram_quantile(0.95, ...)</text>
  <path class="grid" d="M650 415 H1135"/>
  <path class="line" d="M655 410 C760 390, 860 430, 980 395 C1080 360, 1110 440, 1130 388"/>

  <rect class="card" x="40" y="470" width="360" height="130" rx="14"/>
  <text class="label" x="65" y="505">Active Conns</text>
  <text class="muted" x="65" y="530">sum(http_active_connections)</text>
  <text class="title" x="65" y="585" font-size="40">42</text>

  <rect class="card" x="420" y="470" width="360" height="130" rx="14"/>
  <text class="label" x="445" y="505">DB p95 (s)</text>
  <text class="muted" x="445" y="530">db_query_duration_seconds_bucket</text>
  <text class="title" x="445" y="585" font-size="40">0.18</text>

  <rect class="card" x="800" y="470" width="360" height="130" rx="14"/>
  <text class="label" x="825" y="505">Queue p95 (s)</text>
  <text class="muted" x="825" y="530">queue_job_duration_seconds_bucket</text>
  <text class="title" x="825" y="585" font-size="40">1.7</text>
</svg>
