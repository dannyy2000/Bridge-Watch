name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: "20"
  CACHE_VERSION: v1

jobs:
  # Node.js Job for Backend & Frontend
  node-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_DB: bridge_watch_test
          POSTGRES_USER: bridge_watch
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Restore backend build and test caches
        id: backend-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            backend/dist
            backend/coverage
            backend/.eslintcache
          key: ${{ runner.os }}-backend-cache-${{ env.CACHE_VERSION }}-${{ hashFiles('package-lock.json', 'backend/package.json', '.github/workflows/ci.yml', 'backend/src/**', 'backend/test/**') }}
          restore-keys: |
            ${{ runner.os }}-backend-cache-${{ env.CACHE_VERSION }}-${{ hashFiles('package-lock.json', 'backend/package.json', '.github/workflows/ci.yml') }}-
            ${{ runner.os }}-backend-cache-${{ env.CACHE_VERSION }}-

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm --workspace=backend run lint

      - name: Build backend
        run: npm --workspace=backend run build

      - name: Run migrations
        run: npm --workspace=backend run migrate
        env:
          NODE_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: bridge_watch_test
          POSTGRES_USER: bridge_watch
          POSTGRES_PASSWORD: test_password

      - name: Run backend tests
        run: npm --workspace=backend run test -- --coverage
        env:
          NODE_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: bridge_watch_test
          POSTGRES_USER: bridge_watch
          POSTGRES_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Save backend build and test caches
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            backend/dist
            backend/coverage
            backend/.eslintcache
          key: ${{ steps.backend-cache-restore.outputs.cache-primary-key }}

      - name: Backend cache report
        run: |
          echo "backend_cache_hit=${{ steps.backend-cache-restore.outputs.cache-hit }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage/coverage-final.json
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Restore frontend build and test caches
        id: frontend-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            frontend/dist
            frontend/storybook-static
            frontend/.eslintcache
            frontend/.vite
          key: ${{ runner.os }}-frontend-cache-${{ env.CACHE_VERSION }}-${{ hashFiles('package-lock.json', 'frontend/package.json', '.github/workflows/ci.yml', 'frontend/src/**', 'frontend/test/**') }}
          restore-keys: |
            ${{ runner.os }}-frontend-cache-${{ env.CACHE_VERSION }}-${{ hashFiles('package-lock.json', 'frontend/package.json', '.github/workflows/ci.yml') }}-
            ${{ runner.os }}-frontend-cache-${{ env.CACHE_VERSION }}-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Storybook build
        run: npm --workspace=frontend run build-storybook

      - name: Test
        run: npm run test
        continue-on-error: true

      - name: Save frontend build and test caches
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            frontend/dist
            frontend/storybook-static
            frontend/.eslintcache
            frontend/.vite
          key: ${{ steps.frontend-cache-restore.outputs.cache-primary-key }}

      - name: Frontend cache report
        run: |
          echo "frontend_cache_hit=${{ steps.frontend-cache-restore.outputs.cache-hit }}" >> "$GITHUB_STEP_SUMMARY"

  # Rust Job for Smart Contracts
  rust-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Format Check
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Lint (Clippy)
        run: cargo clippy -- -D warnings
        continue-on-error: true

      - name: Build
        run: cargo build --verbose
        continue-on-error: true

      - name: Test
        run: cargo test --verbose
        continue-on-error: true
