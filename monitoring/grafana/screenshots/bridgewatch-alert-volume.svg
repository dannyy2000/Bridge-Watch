<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .bg { fill: #0b1220; }
      .card { fill: #111a2e; stroke: #22304d; stroke-width: 2; }
      .title { fill: #e5e7eb; font: 700 34px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; }
      .sub { fill: #9ca3af; font: 500 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; }
      .label { fill: #cbd5e1; font: 600 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; }
      .muted { fill: #94a3b8; font: 500 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; }
      .ok { fill: #22c55e; }
      .warn { fill: #f59e0b; }
      .bad { fill: #ef4444; }
      .line { stroke: #a78bfa; stroke-width: 3; fill: none; opacity: .9; }
      .grid { stroke: #1f2a44; stroke-width: 1; opacity: .8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="630"/>

  <text class="title" x="40" y="72">Bridge Watch - Alert Volume (Template)</text>
  <text class="sub" x="40" y="102">Example layout (SVG preview). Backed by Prometheus ALERTS and optional Alertmanager metrics.</text>

  <rect class="card" x="40" y="140" width="300" height="130" rx="14"/>
  <text class="label" x="65" y="175">Firing Alerts (now)</text>
  <circle class="warn" cx="285" cy="195" r="10"/>
  <text class="muted" x="65" y="210">sum(ALERTS{alertstate="firing"})</text>
  <text class="title" x="65" y="252" font-size="40">7</text>

  <rect class="card" x="365" y="140" width="795" height="130" rx="14"/>
  <text class="label" x="390" y="175">Firing Alerts by Severity</text>
  <text class="muted" x="390" y="210">sum by(severity) (ALERTS{alertstate="firing"})</text>
  <path class="grid" d="M390 250 H1135"/>
  <path class="line" d="M395 245 C520 200, 700 280, 840 215 C980 160, 1050 270, 1140 235"/>

  <rect class="card" x="40" y="290" width="560" height="160" rx="14"/>
  <text class="label" x="65" y="325">Alert Volume (firing)</text>
  <text class="muted" x="65" y="350">sum(ALERTS{alertstate="firing"})</text>
  <path class="grid" d="M65 415 H575"/>
  <path class="line" d="M70 410 C160 380, 220 445, 310 410 C400 375, 470 440, 565 395"/>

  <rect class="card" x="625" y="290" width="535" height="160" rx="14"/>
  <text class="label" x="650" y="325">Top Firing Alerts</text>
  <text class="muted" x="650" y="350">sum by(alertname) (ALERTS{alertstate="firing"})</text>
  <rect x="660" y="385" width="380" height="14" fill="#60a5fa" opacity=".85"/>
  <rect x="660" y="410" width="310" height="14" fill="#60a5fa" opacity=".75"/>
  <rect x="660" y="435" width="250" height="14" fill="#60a5fa" opacity=".65"/>

  <rect class="card" x="40" y="470" width="560" height="130" rx="14"/>
  <text class="label" x="65" y="505">App Alert Triggers</text>
  <text class="muted" x="65" y="530">rate(alerts_triggered_total[5m])</text>
  <path class="grid" d="M65 575 H575"/>
  <path class="line" d="M70 570 C170 540, 260 595, 360 562 C450 530, 510 592, 565 555"/>

  <rect class="card" x="625" y="470" width="535" height="130" rx="14"/>
  <text class="label" x="650" y="505">Alertmanager Notifications</text>
  <text class="muted" x="650" y="530">rate(alertmanager_notifications_total[5m])</text>
  <path class="grid" d="M650 575 H1135"/>
  <path class="line" d="M655 570 C760 545, 860 590, 970 555 C1070 525, 1100 590, 1130 548"/>
</svg>
